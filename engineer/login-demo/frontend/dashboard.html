<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; text-align: center; }
        button { padding: 10px 20px; margin-top: 30px; }
    </style>
</head>
<body>
    <h1>欢迎来到仪表盘！</h1>
    <p>你已登录成功。</p>
    <p>你的 Token 存储在 localStorage 中，按 F12 查看。</p>
    <button id="logoutBtn">登出</button>

    <script>
        // ---------- 处理 GitHub 回调带来的 token 参数 ----------
        const urlParams = new URLSearchParams(window.location.search);
        const tokenFromUrl = urlParams.get('token');
        if (tokenFromUrl) {
            localStorage.setItem('token', tokenFromUrl);
            // 清除 URL 参数，防止刷新时重复存储（保留页面干净）
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // ---------- 检查是否已登录 ----------
        const token = localStorage.getItem('token');
        if (!token) {
            // 没有 token，跳转到登录页
            window.location.href = 'login.html';
        }

        // ---------- 登出功能 ----------
        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        });

        // 辅助：在控制台打印 token 方便查看
        console.log('你的 Token:', token);
    </script>
</body>
</html>
